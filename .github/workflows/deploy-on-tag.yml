name: Deploy on Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key_clean

          # Supports:
          # 1) multi-line private key in secret
          # 2) one-line key with literal \n escapes
          # 3) base64-encoded private key
          if printf '%s' "${VPS_SSH_KEY}" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%b' "${VPS_SSH_KEY}" | tr -d '\r' > "${KEY_FILE}"
          else
            printf '%s' "${VPS_SSH_KEY}" | tr -d '\r' | base64 -d > "${KEY_FILE}"
          fi

          chmod 600 "${KEY_FILE}"
          ssh-keygen -y -f "${KEY_FILE}" >/dev/null
          eval "$(ssh-agent -s)"
          ssh-add "${KEY_FILE}"

      - name: Add server to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy selected tag over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/var/www/start-api}"

          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${APP_DIR}' bash '${APP_DIR}/scripts/deploy-tag.sh' '${TAG}'"
