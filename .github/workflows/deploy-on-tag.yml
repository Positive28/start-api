name: Deploy on Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key

          # Supports: raw key (multi-line) or base64-encoded
          if printf '%s' "${VPS_SSH_KEY}" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s' "${VPS_SSH_KEY}" | tr -d '\r' > "${KEY_FILE}"
          else
            printf '%s' "${VPS_SSH_KEY}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}"
          fi

          chmod 600 "${KEY_FILE}"
          ssh-keygen -y -f "${KEY_FILE}" >/dev/null || { echo "Key validation failed"; exit 1; }
          echo "Key fingerprint: $(ssh-keygen -lf ${KEY_FILE})"

          eval "$(ssh-agent -s)"
          ssh-add "${KEY_FILE}"

          # Persist agent for next steps (critical!)
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Add server to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Create .env from variables
        env:
          ENV_CONTENT: ${{ vars.ENV_CONTENT }}
        run: |
          set -euo pipefail
          if [[ -z "${ENV_CONTENT}" ]]; then
            echo "::error::ENV_CONTENT variable is required. Add it in Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          printf '%s' "${ENV_CONTENT}" > .env.deploy
          echo "ENV_CONTENT length: $(wc -c < .env.deploy) bytes"

      - name: Deploy selected tag over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/var/www/daladan-api}"
          DEPLOY_SCRIPT_REMOTE="/tmp/deploy-tag.sh"

          # Upload deploy script and .env
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -P "${PORT}" \
            "./scripts/deploy-tag.sh" "${VPS_USER}@${VPS_HOST}:${DEPLOY_SCRIPT_REMOTE}"
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -P "${PORT}" \
            "./.env.deploy" "${VPS_USER}@${VPS_HOST}:${APP_DIR}/.env"

          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            "chmod +x '${DEPLOY_SCRIPT_REMOTE}' && APP_DIR='${APP_DIR}' bash '${DEPLOY_SCRIPT_REMOTE}' '${TAG}'"
